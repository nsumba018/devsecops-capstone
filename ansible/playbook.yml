---
- name: Configure DevSecOps EC2 Server
  hosts: web
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - docker.io
          - nginx
          - git
          - curl
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Start NGINX
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
